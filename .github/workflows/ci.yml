name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs superflus sur la meme ref (une PR qui push vite).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Audit bloquant (regle maison) : echec sur toute vulnerabilite high/critical
      # dans les dependances de production.
      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 7

  e2e:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # La config Playwright construit puis sert le build de production (port 4173) en CI.
      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
